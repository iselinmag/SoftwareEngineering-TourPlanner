<div class="tour-log-container">
  <!-- Section title -->
  <h3>Tour Logs</h3>

  <div class="log-layout">

    <!-- LEFT SIDE: form for creating or editing a log -->
    <div class="log-form-wrapper">
      <div class="log-form">

        <!-- Input field for log date -->
        <div class="form-group">
          <label>Date</label>
          <!-- Two-way binding: input value is stored in form.dateTime -->
          <input type="date" [(ngModel)]="form.dateTime" />
        </div>

        <!-- Input field for short comment -->
        <div class="form-group">
          <label>Comment</label>
          <input
            type="text"
            placeholder="Write a short comment"
            [(ngModel)]="form.comment"
          />
        </div>

        <!-- Dropdown for difficulty level -->
        <div class="form-group">
          <label>Difficulty</label>
          <select [(ngModel)]="form.difficulty">
            <!-- Creates one option for each value in the difficulties array -->
            <option *ngFor="let difficulty of difficulties" [value]="difficulty">
              {{ difficulty }}
            </option>
          </select>
        </div>

        <!-- Input for total distance -->
        <div class="form-group">
          <label>Total Distance (km)</label>
          <input
            type="number"
            placeholder="e.g. 10"
            [(ngModel)]="form.totalDistance"
          />
        </div>

        <!-- Input for total time -->
        <div class="form-group">
          <label>Total Time</label>
          <input
            type="text"
            placeholder="e.g. 01:30"
            [(ngModel)]="form.totalTime"
          />
        </div>

        <!-- Input for rating -->
        <div class="form-group">
          <label>Rating (1–5)</label>
          <input
            type="number"
            min="1"
            max="5"
            [(ngModel)]="form.rating"
          />
        </div>

        <!-- Buttons for saving or cancelling -->
        <div class="form-buttons">
          <!-- Calls saveLog() when clicked -->
          <button (click)="saveLog()">
            <!-- Button text changes depending on whether user edits or adds -->
            {{ isEditing ? 'Save Changes' : 'Add Log' }}
          </button>

          <!-- Cancel button is only shown while editing -->
          <button
            class="secondary-button"
            *ngIf="isEditing"
            (click)="cancelEdit()"
          >
            Cancel
          </button>
        </div>

        <!-- Shows general error message if one exists -->
        <p class="error-message" *ngIf="errorMessage">
          {{ errorMessage }}
        </p>

        <!-- Shows live validation error if rating is outside allowed range -->
        <p class="error-message" *ngIf="form.rating < 1 || form.rating > 5">
          Rating must be between 1 and 5
        </p>
      </div>
    </div>

    <!-- RIGHT SIDE: list of logs -->
    <div class="log-list">

      <!-- Empty state shown when no logs exist for selected tour -->
      <p class="empty-message" *ngIf="vm.filteredLogs().length === 0">
        No logs for the selected tour.
      </p>

      <!-- Creates one log card for each filtered log -->
      <app-log-card
        *ngFor="let log of vm.filteredLogs()"
        [log]="log"
        (edit)="editLog($event)"
        (delete)="deleteLog($event)"
      ></app-log-card>
    </div>
  </div>
</div>
